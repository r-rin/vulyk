<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Files | Vulyk</title>
    <link rel="stylesheet" href="/css/retro.css">
    <script type="module" src="/js/app.js"></script>
</head>
<body class="retro-body" data-page="profile-files">
<div class="page-shell strict-shell">
    <nav class="command-bar" aria-label="Global command bar">
        <div class="command-links">
            <a class="command-link" href="/web/dashboard">Dashboard</a>
            <a class="command-link" href="/web/profile">Profile</a>
            <a class="command-link" href="/web/profile/edit">Edit Profile</a>
            <a class="command-link" href="/web/logout">Logout</a>
        </div>
    </nav>

    <section class="window" th:if="${error != null}">
        <div class="window-title">ERROR</div>
        <div class="window-content" th:text="${error}">Error</div>
    </section>

    <section class="window" th:if="${notice != null}">
        <div class="window-title">NOTICE</div>
        <div class="window-content" th:text="${notice}">Notice</div>
    </section>

    <header class="window accent-red">
        <div class="window-title">MY FILES</div>
        <div class="window-content">
            <h1 class="strict-title">PROFILE FILES</h1>
            <p class="panel-note">All your profile uploads in one place.</p>
        </div>
    </header>

    <section class="window accent-red">
        <div class="window-title">UPLOADS LIST</div>
        <div class="window-content">
            <div class="table-grid" th:if="${!uploadsPage.content.isEmpty()}">
                <div class="row" th:each="file : ${uploadsPage.content}">
                    <div class="cell">
                        <strong th:text="${file.originalFilename}">file</strong>
                        <div class="file-meta">
                            <span th:text="${file.contentType}">type</span>
                            <span> | </span>
                            <span th:text="${file.fileSize}">0</span>
                            <span> bytes</span>
                        </div>
                    </div>
                    <div class="cell">
                        <a class="btn" th:href="@{/files/{id}(id=${file.id})}">DOWNLOAD</a>
                    </div>
                </div>
            </div>
            <p class="empty" th:if="${uploadsPage.content.isEmpty()}">No profile uploads.</p>

            <div class="post-actions" th:if="${uploadsPage.totalPages > 1}">
                <a class="btn" th:if="${!uploadsPage.first}"
                   th:href="@{/web/profile/files(page=${uploadsPage.number - 1})}">Previous</a>
                <span>Page <strong th:text="${uploadsPage.number + 1}">1</strong> / <strong th:text="${uploadsPage.totalPages}">1</strong></span>
                <a class="btn" th:if="${!uploadsPage.last}"
                   th:href="@{/web/profile/files(page=${uploadsPage.number + 1})}">Next</a>
            </div>
        </div>
    </section>
</div>
</body>
</html>
