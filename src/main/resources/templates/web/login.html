<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Vulyk</title>
    <link rel="stylesheet" href="/css/retro.css">
    <script type="module" src="/js/app.js"></script>
</head>
<body class="retro-body" data-page="login">
<div class="page-shell strict-shell narrow-shell">

    <section class="window" th:if="${error != null}">
        <div class="window-title">ERROR</div>
        <div class="window-content" th:text="${error}">Error</div>
    </section>

    <section class="window" th:if="${notice != null}">
        <div class="window-title">NOTICE</div>
        <div class="window-content" th:text="${notice}">Notice</div>
    </section>

    <header class="window accent-blue">
        <div class="window-title">AUTHENTICATION</div>
        <div class="window-content">
            <h1 class="strict-title">LOGIN</h1>
            <p class="panel-note">Authenticate with email or username to unlock protected operations.</p>
            <form id="login-form" class="retro-form" method="post" action="/web/login">
                <label for="login-identifier">Email or Username</label>
                <input id="login-identifier" name="identifier" type="text" maxlength="120" required>
                <label for="login-password">Password</label>
                <input id="login-password" name="password" type="password" maxlength="72" required>
                <button type="submit" class="btn btn-primary">SIGN IN</button>
            </form>
            <p><a href="/web/register">Need an account? Register.</a></p>
        </div>
    </header>
</div>
</body>
</html>
