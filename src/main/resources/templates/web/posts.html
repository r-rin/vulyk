<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posts | Vulyk</title>
    <link rel="stylesheet" href="/css/retro.css">
    <script type="module" src="/js/app.js"></script>
</head>
<body class="retro-body" data-page="posts">
<div class="page-shell strict-shell">
    <nav class="command-bar" aria-label="Global command bar">
        <div class="command-links">
            <a class="command-link" href="/web/dashboard">Dashboard</a>
            <a class="command-link" href="/web/profile">Profile</a>
            <a class="command-link" href="/web/profile/edit">Edit Profile</a>
            <a class="command-link" href="/web/marketplace">Marketplace</a>
            <a class="command-link" href="/web/logout">Logout</a>
        </div>
    </nav>

    <section class="window" th:if="${error != null}">
        <div class="window-title">ERROR</div>
        <div class="window-content" th:text="${error}">Error</div>
    </section>

    <section class="window" th:if="${notice != null}">
        <div class="window-title">NOTICE</div>
        <div class="window-content" th:text="${notice}">Notice</div>
    </section>

    <header class="window accent-blue">
        <div class="window-title">POST MANAGEMENT</div>
        <div class="window-content">
            <h1 class="strict-title">POSTS</h1>
            <p class="panel-note">Create content and inspect filtered feed output in separate sections.</p>
        </div>
    </header>

    <div class="folder-tabs" aria-label="Content folders">
        <a class="folder-tab is-active" href="/web/posts">Posts</a>
        <a class="folder-tab" href="/web/marketplace">Marketplace</a>
    </div>

    <div class="workspace-layout no-sidebar">
        <div class="workspace-main">
            <section class="window accent-green">
                <div class="window-title">CREATE POST</div>
                <div class="window-content">
                    <form id="post-create-form" class="retro-form" method="post" action="/web/posts">
                        <label for="post-title">Title</label>
                        <input id="post-title" name="title" maxlength="100" required>
                        <label for="post-content">Content</label>
                        <textarea id="post-content" name="content" maxlength="1000" required></textarea>
                        <button type="submit" class="btn btn-primary">CREATE POST</button>
                    </form>
                </div>
            </section>

            <section class="window accent-yellow">
                <div class="window-title">BROWSE POSTS</div>
                <div class="window-content">
                    <form id="post-filter-form" class="retro-form compact-form" method="get" action="/web/posts">
                        <label for="post-q">Search</label>
                        <input id="post-q" name="q" maxlength="120" th:value="${query}">
                        <label for="post-state">State</label>
                        <select id="post-state" name="state">
                            <option value="" th:selected="${state == ''}">DEFAULT</option>
                            <option value="PUBLISHED" th:selected="${state == 'PUBLISHED'}">PUBLISHED</option>
                            <option value="DRAFT" th:selected="${state == 'DRAFT'}">DRAFT</option>
                            <option value="HIDDEN" th:selected="${state == 'HIDDEN'}">HIDDEN</option>
                            <option value="REDACTED" th:selected="${state == 'REDACTED'}">REDACTED</option>
                        </select>
                        <button type="submit" class="btn">SEARCH</button>
                    </form>
                    <div id="posts-list" class="feed"
                         th:attr="data-next-page=${postsPage.number + 1},data-last=${postsPage.last},data-query=${query},data-state=${state}">
                        <article class="post-card" th:each="post : ${postsPage.content}">
                            <h3><a th:href="@{/web/posts/{id}(id=${post.id})}" th:text="${post.title}">title</a></h3>
                            <p class="meta">
                                <a th:href="@{/web/person/{username}(username=${post.authorUsername})}" th:text="${post.authorUsername}">author</a>
                                <span th:text="${post.state}">state</span>
                            </p>
                            <p th:text="${post.content}">content</p>
                            <a class="btn" th:href="@{/web/posts/{id}(id=${post.id})}">OPEN PAGE</a>
                        </article>
                    </div>
                    <p id="posts-empty" class="empty" th:if="${postsPage.content.isEmpty()}">No posts found.</p>
                    <div id="posts-scroll-sentinel" class="loading scroll-sentinel" th:if="${!postsPage.last}">Loading more posts...</div>
                </div>
            </section>
        </div>
    </div>
</div>
</body>
</html>
