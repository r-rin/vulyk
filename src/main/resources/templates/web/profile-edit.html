<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile | Vulyk</title>
    <link rel="stylesheet" href="/css/retro.css">
    <script type="module" src="/js/app.js"></script>
</head>
<body class="retro-body" data-page="profile-edit">
<div class="page-shell strict-shell narrow-shell">
    <nav class="command-bar" aria-label="Global command bar">
        <div class="command-links">
            <a class="command-link" href="/web/dashboard">Dashboard</a>
            <a class="command-link" href="/web/profile">Profile</a>
            <a class="command-link" href="/web/posts">Posts</a>
            <a class="command-link" href="/web/marketplace">Marketplace</a>
        </div>
    </nav>

    <section class="window" th:if="${error != null}">
        <div class="window-title">ERROR</div>
        <div class="window-content" th:text="${error}">Error</div>
    </section>

    <section class="window" th:if="${notice != null}">
        <div class="window-title">NOTICE</div>
        <div class="window-content" th:text="${notice}">Notice</div>
    </section>

    <header class="window accent-green">
        <div class="window-title">PROFILE MAINTENANCE</div>
        <div class="window-content">
            <h1 class="strict-title">EDIT PROFILE</h1>
            <p class="panel-note">Update identity fields and manage profile picture in separate operations.</p>
            <form id="profile-edit-form" class="retro-form" method="post" action="/web/profile/edit">
                <label for="edit-username">Username</label>
                <input id="edit-username" name="username" maxlength="60" th:value="${viewProfile.username}">
                <label for="edit-email">Email</label>
                <input id="edit-email" name="email" type="email" maxlength="120" th:value="${viewProfile.email}">
                <label for="edit-name">Name</label>
                <input id="edit-name" name="name" maxlength="60" th:value="${viewProfile.name}">
                <label for="edit-phone">Phone</label>
                <input id="edit-phone" name="phoneNumber" maxlength="15" th:value="${viewProfile.phoneNumber}">
                <label for="edit-bio">Bio</label>
                <textarea id="edit-bio" name="bio" maxlength="2000" th:text="${viewProfile.bio}"></textarea>
                <button type="submit" class="btn btn-primary">SAVE PROFILE</button>
            </form>

            <hr class="hr-groove">

            <form id="profile-picture-form" class="retro-form" method="post" enctype="multipart/form-data" action="/web/profile/picture">
                <label for="profile-picture">Profile picture</label>
                <input id="profile-picture" name="file" type="file" accept="image/*">
                <button type="submit" class="btn">UPLOAD PICTURE</button>
            </form>

            <p><a href="/web/profile">Back to profile</a></p>
        </div>
    </header>
</div>
</body>
</html>
